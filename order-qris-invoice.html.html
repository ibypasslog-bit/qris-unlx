<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNLX Order</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#020617;color:#e5e7eb;padding:20px}
.hidden{display:none}
h2{text-align:center;color:#38bdf8;margin-bottom:10px}

.box{
    max-width:420px;margin:20px auto;
    background:rgba(255,255,255,.05);
    padding:24px;border-radius:18px;
    position:relative;
}
.box::before{
    content:"";position:absolute;inset:0;
    border-radius:18px;padding:1.5px;
    background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
    background-size:300%;
    animation:rgb 6s linear infinite;
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:.6;pointer-events:none;
}

label{font-size:13px;color:#cbd5f5}
select,input,button{
    width:100%;padding:14px;margin:8px 0 14px;
    border-radius:12px;border:1px solid rgba(255,255,255,.2);
    background:rgba(0,0,0,.35);color:white;
}
button{background:#22c55e;font-weight:bold}
button[disabled]{opacity:.4;cursor:not-allowed}

.timer{
    text-align:center;
    font-size:18px;
    color:#facc15;
    margin:10px 0;
}

.qr{display:flex;justify-content:center}
.qr img{width:220px;background:white;padding:10px;border-radius:12px}

.invoice{background:white;color:#020617}
.inv-row{display:flex;justify-content:space-between;margin:6px 0}
.inv-total{border-top:2px dashed #020617;margin-top:10px;padding-top:10px;font-weight:bold}

@keyframes rgb{
    0%{background-position:0%}
    100%{background-position:300%}
}
</style>
</head>
<body>

<!-- FORM -->
<div class="box" id="formBox">
    <h2>ADD ROAMER 3B</h2>

    <label>Tipe IMEI</label>
    <select id="type">
        <option value="">-- Pilih --</option>
        <option value="FAST">IMEI FAST</option>
        <option value="SLOW">IMEI SLOW</option>
    </select>

    <label>IMEI (15 Digit)</label>
    <input id="imei" maxlength="15" inputmode="numeric">

    <button onclick="submitOrder()">🚀 PROSES SEKARANG</button>
</div>

<!-- PAYMENT -->
<div class="box hidden" id="paymentBox">
    <h2>PEMBAYARAN QRIS</h2>

    <div class="timer" id="timer">10:00</div>

    <p>Tipe: <b id="pType"></b></p>
    <p>IMEI: <b id="pImei"></b></p>
    <p><b id="pPrice"></b></p>

    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=UNLX_QRIS">
    </div>

    <label>📸 Upload Bukti Transfer</label>
    <input type="file" id="proof" accept="image/*">

    <button onclick="markPaid()">✅ SAYA SUDAH BAYAR</button>
    <button id="waBtn" onclick="openWA()" disabled>💬 KONFIRMASI KE PENJUAL</button>
    <button onclick="showInvoice()">🧾 BUAT INVOICE</button>
</div>

<!-- INVOICE -->
<div class="box invoice hidden" id="invoiceBox">
    <h2>INVOICE</h2>

    <div class="inv-row"><span>ID</span><span id="invId"></span></div>
    <div class="inv-row"><span>Tanggal</span><span id="invDate"></span></div>
    <hr>
    <div class="inv-row"><span>Layanan</span><span id="invType"></span></div>
    <div class="inv-row"><span>IMEI</span><span id="invImei"></span></div>
    <div class="inv-total inv-row">
        <span>Total</span><span id="invPrice"></span>
    </div>

    <button onclick="window.print()">🖨 PRINT / SAVE PDF</button>
</div>

<script>
const ADMIN_WA = "6283180892322";
let order={}, paid=false;
let timeLeft=600, timerInterval;

function submitOrder(){
    const type=typeEl.value, imei=imeiEl.value;
    if(!type) return alert("Pilih tipe");
    if(!/^[0-9]{15}$/.test(imei)) return alert("IMEI 15 digit");

    const price = type==="FAST"?150000:80000;
    order={id:Date.now(),type,imei,price};

    pType.textContent=type;
    pImei.textContent=imei;
    pPrice.textContent="Rp "+price.toLocaleString();

    formBox.classList.add("hidden");
    paymentBox.classList.remove("hidden");

    startTimer();
}

function startTimer(){
    updateTimer();
    timerInterval=setInterval(()=>{
        timeLeft--;
        updateTimer();
        if(timeLeft<=0){
            clearInterval(timerInterval);
            alert("Waktu pembayaran habis");
            location.reload();
        }
    },1000);
}
function updateTimer(){
    const m=Math.floor(timeLeft/60);
    const s=timeLeft%60;
    timer.textContent=`${m}:${s.toString().padStart(2,"0")}`;
}

function markPaid(){
    if(!proof.files.length)
        return alert("Upload bukti transfer dulu");

    paid=true;
    waBtn.disabled=false;
    alert("Bukti diterima, silakan konfirmasi ke penjual");
}

function openWA(){
    if(!paid) return;
    const msg=
`KONFIRMASI PEMBAYARAN
Invoice: ${order.id}
Tipe: ${order.type}
IMEI: ${order.imei}
Total: Rp ${order.price.toLocaleString()}
Status: SUDAH BAYAR`;
    window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`);
}

function showInvoice(){
    invId.textContent=order.id;
    invDate.textContent=new Date().toLocaleString();
    invType.textContent=order.type;
    invImei.textContent=order.imei;
    invPrice.textContent="Rp "+order.price.toLocaleString();

    paymentBox.classList.add("hidden");
    invoiceBox.classList.remove("hidden");
}

const typeEl=document.getElementById("type");
const imeiEl=document.getElementById("imei");
</script>

</body>
</html>
